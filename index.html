<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/assets/hero_desktop.webp" imagesrcset="/assets/hero_mobile.webp 600w, /assets/hero_desktop.webp 1200w" imagesizes="(max-width: 768px) 100vw, 50vw" fetchpriority="high">
    <meta name="description" content="Bhairavnath Interior Works offers premium luxury interior design and turnkey execution services in Mumbai. Over 20+ years of carpentry and modular craftsmanship." />
    <title>Bhairavnath Interior Works | Premium Luxury Interior Design</title>
    <!-- Google Fonts: Playfair Display & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    </noscript>
  </head>
  <body>
    <div id="root">
      <!-- Prerendered Above-The-Fold Shell -->
      <section id="home" class="hero-section">
        <div class="container grid-split-2">
          <div class="hero-content">
            <span class="section-tag">Premium Interior Studio</span>
            <h1 class="hero-title">
              Designing Spaces <br />
              That Inspire <span>Living</span>
            </h1>
            <p class="hero-description">
              We craft exceptional, warm-minimalist interiors that blend functionality and premium aesthetics. Every space is curated with natural textures, balanced proportions, and a focus on timeless beauty.
            </p>
            <div class="hero-buttons">
              <a class="btn-primary" href="/projects">Explore Our Work</a>
              <a class="btn-secondary" href="/#contact">Book Consultation</a>
            </div>
          </div>
          <div class="hero-image-wrapper">
            <div class="hero-image-container">
              <img 
                src="/assets/hero_desktop.webp" 
                srcset="/assets/hero_mobile.webp 600w,
                        /assets/hero_desktop.webp 1200w"
                sizes="(max-width: 768px) 100vw, 50vw"
                alt="Warm minimalist luxury living room" 
                class="hero-img"
                fetchpriority="high"
              />
            </div>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
