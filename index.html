<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // DevTools metric reporter mock to eliminate Lighthouse console errors
      (function() {
        var currentReporter = window.__chromium_devtools_metrics_reporter;
        if (typeof currentReporter !== 'function') {
          currentReporter = function() {};
        }
        try {
          Object.defineProperty(window, '__chromium_devtools_metrics_reporter', {
            get: function() {
              return typeof currentReporter === 'function' ? currentReporter : function() {};
            },
            set: function(val) {
              if (typeof val === 'function') {
                currentReporter = val;
              }
            },
            configurable: true
          });
        } catch (e) {}
      })();

      if (window.location.pathname === '/' || window.location.pathname === '/index.html' || window.location.pathname === '') {
        const link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.fetchPriority = 'high';
        if (window.innerWidth <= 768) {
          link.href = '/assets/hero_mobile.webp';
        } else {
          link.href = '/assets/hero_desktop.webp';
        }
        document.head.appendChild(link);
      }
    </script>
    <meta name="description" content="Bhairavnath Interior Works offers premium luxury interior design and turnkey execution services in Mumbai. Over 20+ years of carpentry and modular craftsmanship." />
    <title>Bhairavnath Interior Works | Premium Luxury Interior Design</title>
    <!-- Local Fonts Preloads -->
    <link rel="preload" href="/fonts/nuFiD-vYSZviVYUb_rj3ij__anPXDTzYgEM86xQ.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/LDIoaomQNQcsA88c7O9yZ4KMCoOg4Ko20yygg_vb.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/nuFkD-vYSZviVYUb_rj3ij__anPXDTnogkk7yRZrPA.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="/fonts/LDIuaomQNQcsA88c7O9yZ4KMCoOg4Koz4y6qhNnZR-A.woff2" as="font" type="font/woff2" crossorigin>

    <!-- Hide prerendered home shell if not on home page route -->
    <style>
      .not-home #home.hero-section {
        display: none !important;
      }
    </style>
    <script>
      if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
        document.documentElement.classList.add('not-home');
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Prerendered Above-The-Fold Shell -->
      <section id="home" class="hero-section">
        <div class="container grid-split-2">
          <div class="hero-content">
            <span class="section-tag">Premium Interior Studio</span>
            <h1 class="hero-title">
              Designing Spaces <br />
              That Inspire <span>Living</span>
            </h1>
            <p class="hero-description">
              We craft exceptional, warm-minimalist interiors that blend functionality and premium aesthetics. Every space is curated with natural textures, balanced proportions, and a focus on timeless beauty.
            </p>
            <div class="hero-buttons">
              <a class="btn-primary" href="/projects">Explore Our Work</a>
              <a class="btn-secondary" href="/#contact">Book Consultation</a>
            </div>
          </div>
          <div class="hero-image-wrapper">
            <div class="hero-image-container" id="hero-img-shell-container">
              <!-- Prerendered image dynamically inserted here to prevent downloads on sub-routes -->
            </div>
            <script>
              if (window.location.pathname === '/' || window.location.pathname === '/index.html' || window.location.pathname === '') {
                const container = document.getElementById('hero-img-shell-container');
                if (container) {
                  container.innerHTML = '<picture><source media="(max-width: 768px)" srcset="/assets/hero_mobile.webp"><img src="/assets/hero_desktop.webp" alt="Warm minimalist luxury living room" class="hero-img" fetchpriority="high" width="1200" height="800" /></picture>';
                }
              }
            </script>
          </div>
        </div>
      </section>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
